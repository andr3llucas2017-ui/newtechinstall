<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEW TECH - Instalador Automático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-active { border-color: #2563eb !important; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-32">

    <header class="bg-slate-900 text-white py-10 shadow-xl">
        <div class="container mx-auto text-center">
            <h1 class="text-5xl font-extrabold tracking-tight">NEW TECH</h1>
            <p class="mt-3 text-slate-400 text-lg">Soluções em Tecnologia: Instalação Simplificada</p>
        </div>
    </header>

    <main class="container mx-auto mt-12 px-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="app-grid">
            </div>

        <div class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-md border-t p-6 flex justify-center shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)]">
            <button id="btn-download" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-12 rounded-2xl transition-all transform hover:scale-105 active:scale-95 shadow-lg">
                Baixar Instalador Personalizado (.bat)
            </button>
        </div>
    </main>

    <script>
        // IDs extraídos da sua lista técnica
        const apps = [
            { name: 'Google Chrome', id: 'Google.Chrome', cat: 'Navegador' },
            { name: 'Mozilla Firefox', id: 'Mozilla.Firefox.ESR', cat: 'Navegador' },
            { name: 'AnyDesk', id: 'AnyDeskSoftwareGmbH.AnyDesk', cat: 'Remoto' },
            { name: 'WinRAR', id: 'RARLab.WinRAR', cat: 'Utilitário' },
            { name: 'VLC Player', id: 'VideoLAN.VLC', cat: 'Media' },
            { name: 'K-Lite Codec', id: 'CodecGuide.K-LiteCodecPack.Full', cat: 'Media' },
            { name: 'Adobe Reader', id: 'Adobe.Acrobat.Reader.64-bit', cat: 'Documentos' },
            { name: 'Revo Uninstaller', id: 'RevoUninstaller.RevoUninstaller', cat: 'Utilitário' },
            { name: 'Visual Studio Code', id: 'Microsoft.VisualStudioCode', cat: 'Dev' },
            { name: 'Runtime .NET 8', id: 'Microsoft.DotNet.DesktopRuntime.8', cat: 'Sistema' },
            { name: 'VC++ Redist 2015+', id: 'Microsoft.VCRedist.2015+.x64', cat: 'Sistema' }
        ];

        const grid = document.getElementById('app-grid');

        apps.forEach(app => {
            const card = document.createElement('div');
            card.className = "bg-white p-5 rounded-2xl shadow-sm border-2 border-gray-100 cursor-pointer hover:shadow-md transition-all flex items-center space-x-4";
            card.innerHTML = `
                <input type="checkbox" value="${app.id}" class="w-6 h-6 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <div class="flex-1">
                    <h3 class="font-bold text-slate-800">${app.name}</h3>
                    <span class="text-xs font-semibold px-2 py-1 bg-gray-100 text-gray-500 rounded-md uppercase">${app.cat}</span>
                </div>
            `;
            card.onclick = (e) => {
                const cb = card.querySelector('input');
                if (e.target !== cb) cb.checked = !cb.checked;
                card.classList.toggle('card-active', cb.checked);
            };
            grid.appendChild(card);
        });

        document.getElementById('btn-download').onclick = async () => {
            const selected = Array.from(document.querySelectorAll('input:checked')).map(cb => cb.value);
            if(selected.length === 0) return alert("Selecione pelo menos um aplicativo.");

            try {
                const response = await fetch('https://newtechinstall.onrender.com', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: selected })
                });

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "instalar_new_tech.bat";
                a.click();
            } catch (err) {
                alert("Erro: Certifique-se de que o servidor backend está rodando!");
            }
        };
    </script>
</body>
</html>
