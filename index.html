<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEW TECH - Instalador Automático</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-active { border-color: #2563eb !important; background-color: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50 font-sans pb-32">

    <header class="bg-slate-900 text-white py-12 shadow-xl border-b-4 border-blue-600">
        <div class="container mx-auto text-center px-4">
            <h1 class="text-5xl font-extrabold tracking-tight italic">NEW TECH</h1>
            <p class="mt-3 text-slate-400 text-lg uppercase tracking-widest">Soluções em Tecnologia</p>
        </div>
    </header>

    <main class="container mx-auto mt-12 px-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="app-grid">
            </div>

        <div class="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-md border-t p-6 flex justify-center shadow-[0_-10px_20px_rgba(0,0,0,0.1)] z-50">
            <button id="btn-download" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-16 rounded-2xl transition-all transform hover:scale-105 active:scale-95 shadow-lg text-lg">
                Gerar Instalador Personalizado (.bat)
            </button>
        </div>
    </main>

    <script>
        const apps = [
            { name: 'Google Chrome', id: 'Google.Chrome', cat: 'Navegador' },
            { name: 'Mozilla Firefox', id: 'Mozilla.Firefox.ESR', cat: 'Navegador' },
            { name: 'AnyDesk', id: 'AnyDeskSoftwareGmbH.AnyDesk', cat: 'Remoto' },
            { name: 'WinRAR', id: 'RARLab.WinRAR', cat: 'Utilitário' },
            { name: 'VLC Media Player', id: 'VideoLAN.VLC', cat: 'Media' },
            { name: 'Adobe Reader', id: 'Adobe.Acrobat.Reader.64-bit', cat: 'Documentos' },
            { name: 'K-Lite Codec', id: 'CodecGuide.K-LiteCodecPack.Full', cat: 'Media' },
            { name: 'Visual Studio Code', id: 'Microsoft.VisualStudioCode', cat: 'Dev' },
            { name: 'Revo Uninstaller', id: 'RevoUninstaller.RevoUninstaller', cat: 'Utilitário' },
            { name: 'Runtime .NET 8', id: 'Microsoft.DotNet.DesktopRuntime.8', cat: 'Sistema' },
            { name: 'VC++ Redist 2015+', id: 'Microsoft.VCRedist.2015+.x64', cat: 'Sistema' }
        ];

        const grid = document.getElementById('app-grid');

        apps.forEach(app => {
            const card = document.createElement('div');
            card.className = "bg-white p-6 rounded-2xl shadow-sm border-2 border-gray-100 cursor-pointer hover:shadow-md transition-all flex items-center space-x-4";
            card.innerHTML = `
                <input type="checkbox" value="${app.id}" class="w-6 h-6 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <div class="flex-1">
                    <h3 class="font-bold text-slate-800 leading-tight">${app.name}</h3>
                    <span class="text-[10px] font-bold px-2 py-0.5 bg-slate-100 text-slate-500 rounded uppercase tracking-wider">${app.cat}</span>
                </div>
            `;
            card.onclick = (e) => {
                const cb = card.querySelector('input');
                if (e.target !== cb) cb.checked = !cb.checked;
                card.classList.toggle('card-active', cb.checked);
            };
            grid.appendChild(card);
        });

        document.getElementById('btn-download').onclick = async () => {
            const selected = Array.from(document.querySelectorAll('input:checked')).map(cb => cb.value);
            if(selected.length === 0) return alert("Por favor, selecione pelo menos um aplicativo.");

            const btn = document.getElementById('btn-download');
            btn.innerText = "Processando...";
            btn.disabled = true;

            try {
                const response = await fetch('https://newtechinstall.onrender.com/gerar-instalador', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: selected })
                });

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "Instalador_NEW_TECH.bat";
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch (err) {
                alert("Erro na conexão. Verifique se o servidor está online.");
            } finally {
                btn.innerText = "Gerar Instalador Personalizado (.bat)";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
